---
kind: Simulation
spec:
  arch: linux-amd64
  channels:
    - name: physical
  stacks:
    - name: default
      models:
        - name: linear
          model: dse.fmi.mcl
          uses: dse.fmi
          channels:
            - alias: scalar_vector
              name: physical
          workflows:
            - name: generate-fmimcl
              vars:
                - name: FMU_DIR
                  reference: uses
                  value: linear_fmu
                - name: OUT_DIR
                  value: '{{.PATH}}/data'
                - name: MCL_PATH
                  value: '{{.PATH}}/lib/libfmimcl.so'
          metadata:
            package:
              download: '{{.REPO}}/releases/download/v{{.TAG}}/Fmi-{{.TAG}}-{{.PLATFORM_ARCH}}.zip'
            models:
              dse.fmi.mcl:
                path: fmimcl
                mcl: true
  uses:
    - name: dse.fmi
      url: https://github.com/boschglobal/dse.fmi
      version: v1.1.20
      metadata:
        container:
          repository: ghcr.io/boschglobal/dse-fmi
    - name: linear_fmu
      url: https://github.com/boschglobal/dse.fmi/releases/download/v1.1.20/Fmi-1.1.20-linux-amd64.zip
      path: examples/fmu/linear/fmi2/linear.fmu
      metadata: {}
