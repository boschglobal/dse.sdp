---
kind: Simulation
spec:
  arch: linux-amd64
  channels:
    - name: physical
  stacks:
    - name: default
      models:
        - name: input
          model: dse.modelc.csv
          uses: dse.modelc
          channels:
            - alias: scalar_vector
              name: physical
          metadata:
            models:
              dse.modelc.csv:
                path: examples/csv
  uses:
    - name: dse.modelc
      url: https://github.com/boschglobal/dse.modelc
      version: v2.1.15
      metadata:
        container:
          repository: ghcr.io/boschglobal/dse-modelc
